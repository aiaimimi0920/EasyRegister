x-easyregister-test-env: &easyregister-test-env
  EASY_PROTOCOL_BASE_URL: ${EASYREGISTER_TEST_EASY_PROTOCOL_BASE_URL:-http://easy-protocol-service:9788}
  EASY_PROTOCOL_CONTROL_TOKEN: ${EASYREGISTER_TEST_EASY_PROTOCOL_CONTROL_TOKEN:-}
  EASY_PROTOCOL_CONTROL_ACTOR: ${EASYREGISTER_TEST_EASY_PROTOCOL_CONTROL_ACTOR:-easyregister-test-dashboard}
  EASY_PROTOCOL_TIMEOUT_SECONDS: ${EASYREGISTER_TEST_EASY_PROTOCOL_TIMEOUT_SECONDS:-900}
  MAILBOX_SERVICE_BASE_URL: ${EASYREGISTER_TEST_MAILBOX_SERVICE_BASE_URL:-http://easy-email-service:8080}
  MAILBOX_SERVICE_API_KEY: ${EASYREGISTER_TEST_MAILBOX_SERVICE_API_KEY:-}
  EASY_PROXY_BASE_URL: ${EASYREGISTER_TEST_EASY_PROXY_BASE_URL:-http://easy-proxy-service:29888}
  EASY_PROXY_API_KEY: ${EASYREGISTER_TEST_EASY_PROXY_API_KEY:-}
  REGISTER_ENABLE_EASY_PROXY: ${EASYREGISTER_TEST_ENABLE_EASY_PROXY:-true}
  REGISTER_REQUIRE_EASY_PROXY: ${EASYREGISTER_TEST_REQUIRE_EASY_PROXY:-true}
  REGISTER_CREATE_ACCOUNT_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_CREATE_ACCOUNT_COOLDOWN_SECONDS:-120}
  REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_MAILBOX_FAILURE_COOLDOWN_SECONDS:-15}
  REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD: ${EASYREGISTER_TEST_MAILBOX_CLEANUP_FAILURE_THRESHOLD:-3}
  REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_MAILBOX_CLEANUP_COOLDOWN_SECONDS:-120}
  REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT: ${EASYREGISTER_TEST_MAILBOX_CLEANUP_MAX_DELETE_COUNT:-30}
  REGISTER_TEAM_CAPACITY_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_TEAM_CAPACITY_COOLDOWN_SECONDS:-180}
  REGISTER_CRASH_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_CRASH_COOLDOWN_SECONDS:-20}
  REGISTER_TASK_MAX_ATTEMPTS: ${EASYREGISTER_TEST_TASK_MAX_ATTEMPTS:-0}
  REGISTER_OPENAI_OAUTH_SEED_MAX_AGE_SECONDS: ${EASYREGISTER_TEST_OPENAI_OAUTH_SEED_MAX_AGE_SECONDS:-900}
  REGISTER_TEAM_AUTH_LOCAL_DIR: /shared/register-output/codex/team-input
  REGISTER_TEAM_AUTH_DEFAULT_DIR: /shared/register-output/codex/team-input
  REGISTER_TEAM_AUTH_DIR: /shared/register-output/codex/team-input
  REGISTER_TEAM_AUTH_GLOB: ${EASYREGISTER_TEST_TEAM_AUTH_GLOB:-*-team.json}
  REGISTER_TEAM_AUTH_PATHS: ${EASYREGISTER_TEST_TEAM_AUTH_PATHS:-}

x-easyregister-test-common: &easyregister-test-common
  build:
    context: ..
    dockerfile: deploy/Dockerfile
    args:
      REGISTER_SERVICE_BASE_IMAGE: ${EASYREGISTER_TEST_BASE_IMAGE:-python:3.10-bookworm}
  image: ${EASYREGISTER_TEST_IMAGE:-easyregister/easyregister-test:local}
  restart: unless-stopped
  volumes:
    - ${EASYREGISTER_TEST_OUTPUT_DIR_HOST:-../tmp/easyregister-test-output}:/shared/register-output
    - ${EASYREGISTER_TEST_TEAM_AUTH_DIR_HOST:-../tmp/easyregister-test-team-auth}:/shared/team-auth:ro
    - ../server:/app/server
    - ../README.md:/app/README.md:ro
  networks:
    - EasyAiMi

services:
  easyregister-test-main:
    <<: *easyregister-test-common
    container_name: easyregister-test-main
    environment:
      <<: *easyregister-test-env
      REGISTER_INSTANCE_ID: easyregister-test-main
      REGISTER_INSTANCE_ROLE: main
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${EASYREGISTER_TEST_MAIN_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${EASYREGISTER_TEST_MAIN_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${EASYREGISTER_TEST_MAIN_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/main-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: /shared/register-output/openai/pending
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: /shared/register-output/openai/converted
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: /shared/register-output/others/openai-oauth-wait-pool
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: /shared/register-output/openai/failed-once
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${EASYREGISTER_TEST_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: /shared/register-output/codex/free
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${EASYREGISTER_TEST_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: /shared/register-output/codex/free
      REGISTER_FREE_WORKSPACE_SELECTOR: ${EASYREGISTER_TEST_FREE_WORKSPACE_SELECTOR:-personal}
      REGISTER_FREE_OAUTH_DELAY_SECONDS: ${EASYREGISTER_TEST_FREE_OAUTH_DELAY_SECONDS:-0}
      REGISTER_FREE_STOP_AFTER_VALIDATE: ${EASYREGISTER_TEST_FREE_STOP_AFTER_VALIDATE:-false}
      REGISTER_LOOP_DELAY_SECONDS: ${EASYREGISTER_TEST_MAIN_LOOP_DELAY_SECONDS:-30}
      REGISTER_WORKER_COUNT: ${EASYREGISTER_TEST_MAIN_WORKER_COUNT:-1}
      REGISTER_WORKER_STAGGER_SECONDS: ${EASYREGISTER_TEST_MAIN_WORKER_STAGGER_SECONDS:-5}
      REGISTER_INFINITE_MAX_RUNS: ${EASYREGISTER_TEST_MAIN_INFINITE_MAX_RUNS:-0}
      REGISTER_FLOW_PATH: ${EASYREGISTER_TEST_MAIN_FLOW_PATH:-}
      REGISTER_DASHBOARD_ENABLED: ${EASYREGISTER_TEST_DASHBOARD_ENABLED:-true}
      REGISTER_DASHBOARD_LISTEN: ${EASYREGISTER_TEST_DASHBOARD_LISTEN:-0.0.0.0:9790}
      REGISTER_DASHBOARD_ALLOW_REMOTE: ${EASYREGISTER_TEST_DASHBOARD_ALLOW_REMOTE:-true}
      REGISTER_DASHBOARD_RECENT_WINDOW_SECONDS: ${EASYREGISTER_TEST_DASHBOARD_RECENT_WINDOW_SECONDS:-900}
    ports:
      - ${EASYREGISTER_TEST_DASHBOARD_PORT_HOST:-29790}:9790

  easyregister-test-continue:
    <<: *easyregister-test-common
    container_name: easyregister-test-continue
    environment:
      <<: *easyregister-test-env
      REGISTER_INSTANCE_ID: easyregister-test-continue
      REGISTER_INSTANCE_ROLE: continue
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${EASYREGISTER_TEST_CONTINUE_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${EASYREGISTER_TEST_CONTINUE_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${EASYREGISTER_TEST_CONTINUE_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/continue-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: /shared/register-output/openai/failed-once
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: /shared/register-output/openai/converted
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: /shared/register-output/others/openai-oauth-wait-pool
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: /shared/register-output/openai/failed-once
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${EASYREGISTER_TEST_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: /shared/register-output/codex/free
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${EASYREGISTER_TEST_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: /shared/register-output/codex/free
      REGISTER_FREE_WORKSPACE_SELECTOR: ${EASYREGISTER_TEST_FREE_WORKSPACE_SELECTOR:-personal}
      REGISTER_FREE_OAUTH_DELAY_SECONDS: ${EASYREGISTER_TEST_FREE_OAUTH_DELAY_SECONDS:-0}
      REGISTER_LOOP_DELAY_SECONDS: ${EASYREGISTER_TEST_CONTINUE_LOOP_DELAY_SECONDS:-15}
      REGISTER_WORKER_COUNT: ${EASYREGISTER_TEST_CONTINUE_WORKER_COUNT:-1}
      REGISTER_WORKER_STAGGER_SECONDS: ${EASYREGISTER_TEST_CONTINUE_WORKER_STAGGER_SECONDS:-5}
      REGISTER_INFINITE_MAX_RUNS: ${EASYREGISTER_TEST_CONTINUE_INFINITE_MAX_RUNS:-0}
      REGISTER_FLOW_PATH: /app/server/services/orchestration_service/flows/codex-openai-oauth-continue-v1.semantic-flow.json
      REGISTER_DASHBOARD_ENABLED: "false"

  easyregister-test-team:
    <<: *easyregister-test-common
    container_name: easyregister-test-team
    environment:
      <<: *easyregister-test-env
      REGISTER_INSTANCE_ID: easyregister-test-team
      REGISTER_INSTANCE_ROLE: team
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${EASYREGISTER_TEST_TEAM_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${EASYREGISTER_TEST_TEAM_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${EASYREGISTER_TEST_TEAM_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/team-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: /shared/register-output/openai/pending
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: /shared/register-output/openai/converted
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: /shared/register-output/others/openai-oauth-wait-pool
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: /shared/register-output/openai/failed-once
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${EASYREGISTER_TEST_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: /shared/register-output/codex/free
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${EASYREGISTER_TEST_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: /shared/register-output/codex/free
      REGISTER_TEAM_LOCAL_SPLIT_PERCENT: ${EASYREGISTER_TEST_TEAM_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_TEAM_LOCAL_DIR: /shared/register-output/codex/team
      REGISTER_LOOP_DELAY_SECONDS: ${EASYREGISTER_TEST_TEAM_LOOP_DELAY_SECONDS:-20}
      REGISTER_WORKER_COUNT: ${EASYREGISTER_TEST_TEAM_WORKER_COUNT:-1}
      REGISTER_WORKER_STAGGER_SECONDS: ${EASYREGISTER_TEST_TEAM_WORKER_STAGGER_SECONDS:-5}
      REGISTER_TEAM_STALE_CLAIM_SECONDS: ${EASYREGISTER_TEST_TEAM_STALE_CLAIM_SECONDS:-60}
      REGISTER_TEAM_OAUTH_FAILURE_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_TEAM_OAUTH_FAILURE_COOLDOWN_SECONDS:-300}
      REGISTER_TEAM_INVITE_FAILURE_COOLDOWN_SECONDS: ${EASYREGISTER_TEST_TEAM_INVITE_FAILURE_COOLDOWN_SECONDS:-300}
      REGISTER_INFINITE_MAX_RUNS: ${EASYREGISTER_TEST_TEAM_INFINITE_MAX_RUNS:-0}
      REGISTER_FLOW_PATH: /app/server/services/orchestration_service/flows/codex-team-expand-v1.semantic-flow.json
      REGISTER_DASHBOARD_ENABLED: "false"
      REGISTER_TEAM_PRE_POOL_DIR: /shared/register-output/others/team-pre-pool
      REGISTER_TEAM_MOTHER_POOL_DIR: /shared/register-output/codex/team-mother-input
      REGISTER_TEAM_MOTHER_CLAIMS_DIR: /shared/register-output/others/team-mother-claims
      REGISTER_TEAM_MEMBER_CLAIMS_DIR: /shared/register-output/others/team-member-claims
      REGISTER_TEAM_POST_POOL_DIR: /shared/register-output/others/team-post-pool
      REGISTER_TEAM_POOL_DIR: /shared/register-output/codex/team
      REGISTER_TEAM_PRE_FILL_COUNT: ${EASYREGISTER_TEST_TEAM_PRE_FILL_COUNT:-1}
      REGISTER_TEAM_MEMBER_COUNT: ${EASYREGISTER_TEST_TEAM_MEMBER_COUNT:-4}
      REGISTER_TEAM_WORKSPACE_SELECTOR: ${EASYREGISTER_TEST_TEAM_WORKSPACE_SELECTOR:-first_team}

networks:
  EasyAiMi:
    external: true
