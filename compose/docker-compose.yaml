services:
  register-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        REGISTER_SERVICE_BASE_IMAGE: ${REGISTER_SERVICE_BASE_IMAGE:-registerservice/register-service:local}
    image: registerservice/register-service:local
    container_name: register-service
    restart: unless-stopped
    environment:
      REGISTER_INSTANCE_ID: main
      REGISTER_INSTANCE_ROLE: main
      EASY_PROTOCOL_BASE_URL: http://easy-protocol-service:9788
      EASY_PROTOCOL_CONTROL_TOKEN: ${EASY_PROTOCOL_CONTROL_TOKEN:-}
      EASY_PROTOCOL_CONTROL_ACTOR: ${EASY_PROTOCOL_CONTROL_ACTOR:-register-dashboard}
      EASY_PROTOCOL_TIMEOUT_SECONDS: "900"
      MAILBOX_SERVICE_BASE_URL: http://easy-email-service:8080
      MAILBOX_SERVICE_API_KEY: ${MAILBOX_SERVICE_API_KEY}
      EASY_PROXY_BASE_URL: http://easy-proxy-service:9888
      EASY_PROXY_API_KEY: ${EASY_PROXY_API_KEY}
      REGISTER_ENABLE_EASY_PROXY: "true"
      REGISTER_REQUIRE_EASY_PROXY: "true"
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${REGISTER_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${REGISTER_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${REGISTER_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/main-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: ${REGISTER_OPENAI_OAUTH_POOL_DIR:-/shared/register-output/openai/pending}
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: ${REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR:-/shared/register-output/openai/converted}
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: ${REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR:-/shared/register-output/others/openai-oauth-wait-pool}
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: ${REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR:-/shared/register-output/openai/failed-once}
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${REGISTER_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: ${REGISTER_FREE_OAUTH_POOL_DIR:-/shared/register-output/codex/free}
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${REGISTER_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: ${REGISTER_FREE_LOCAL_DIR:-/shared/register-output/codex/free}
      REGISTER_FREE_WORKSPACE_SELECTOR: ${REGISTER_FREE_WORKSPACE_SELECTOR:-personal}
      REGISTER_FREE_OAUTH_DELAY_SECONDS: ${REGISTER_FREE_OAUTH_DELAY_SECONDS:-0}
      REGISTER_FREE_STOP_AFTER_VALIDATE: ${REGISTER_FREE_STOP_AFTER_VALIDATE:-false}
      REGISTER_TEAM_AUTH_LOCAL_DIR: ${REGISTER_TEAM_AUTH_LOCAL_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_DEFAULT_DIR: ${REGISTER_TEAM_AUTH_DEFAULT_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_DIR: ${REGISTER_TEAM_AUTH_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_GLOB: ${REGISTER_TEAM_AUTH_GLOB:-*-team.json}
      REGISTER_TEAM_AUTH_PATHS: ${REGISTER_TEAM_AUTH_PATHS:-}
      REGISTER_LOOP_DELAY_SECONDS: ${REGISTER_LOOP_DELAY_SECONDS:-30}
      REGISTER_WORKER_COUNT: "7"
      REGISTER_WORKER_STAGGER_SECONDS: ${REGISTER_WORKER_STAGGER_SECONDS:-20}
      REGISTER_CREATE_ACCOUNT_COOLDOWN_SECONDS: ${REGISTER_CREATE_ACCOUNT_COOLDOWN_SECONDS:-120}
      REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS:-15}
      REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD: ${REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD:-3}
      REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS:-120}
      REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT: ${REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT:-30}
      REGISTER_TEAM_CAPACITY_COOLDOWN_SECONDS: ${REGISTER_TEAM_CAPACITY_COOLDOWN_SECONDS:-180}
      REGISTER_CRASH_COOLDOWN_SECONDS: ${REGISTER_CRASH_COOLDOWN_SECONDS:-20}
      REGISTER_INFINITE_MAX_RUNS: ${REGISTER_INFINITE_MAX_RUNS:-0}
      REGISTER_TASK_MAX_ATTEMPTS: ${REGISTER_TASK_MAX_ATTEMPTS:-0}
      REGISTER_FLOW_PATH: ${REGISTER_FLOW_PATH:-}
      REGISTER_DASHBOARD_ENABLED: ${REGISTER_DASHBOARD_ENABLED:-true}
      REGISTER_DASHBOARD_LISTEN: ${REGISTER_DASHBOARD_LISTEN:-127.0.0.1:9790}
      REGISTER_DASHBOARD_RECENT_WINDOW_SECONDS: ${REGISTER_DASHBOARD_RECENT_WINDOW_SECONDS:-900}
    volumes:
      - ${REGISTER_OUTPUT_DIR_HOST}:/shared/register-output
      - ${REGISTER_TEAM_AUTH_DIR_HOST:-C:/Users/vmjcv/.cli-proxy-api/team}:/shared/team-auth:ro
      - ../server:/app/server
      - ../README.md:/app/README.md:ro
    ports:
      - ${REGISTER_DASHBOARD_PORT_HOST:-19790}:9790
    networks:
      - EasyAiMi

  register-continue-service:
    image: registerservice/register-service:local
    container_name: register-continue-service
    restart: unless-stopped
    environment:
      REGISTER_INSTANCE_ID: continue
      REGISTER_INSTANCE_ROLE: continue
      EASY_PROTOCOL_BASE_URL: http://easy-protocol-service:9788
      EASY_PROTOCOL_TIMEOUT_SECONDS: "900"
      MAILBOX_SERVICE_BASE_URL: http://easy-email-service:8080
      MAILBOX_SERVICE_API_KEY: ${MAILBOX_SERVICE_API_KEY}
      EASY_PROXY_BASE_URL: http://easy-proxy-service:9888
      EASY_PROXY_API_KEY: ${EASY_PROXY_API_KEY}
      REGISTER_ENABLE_EASY_PROXY: "true"
      REGISTER_REQUIRE_EASY_PROXY: "true"
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${REGISTER_CONTINUE_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${REGISTER_CONTINUE_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${REGISTER_CONTINUE_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/continue-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: ${REGISTER_CONTINUE_OPENAI_OAUTH_POOL_DIR:-/shared/register-output/openai/failed-once}
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: ${REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR:-/shared/register-output/openai/converted}
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: ${REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR:-/shared/register-output/others/openai-oauth-wait-pool}
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: ${REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR:-/shared/register-output/openai/failed-once}
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${REGISTER_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: ${REGISTER_FREE_OAUTH_POOL_DIR:-/shared/register-output/codex/free}
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${REGISTER_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: ${REGISTER_FREE_LOCAL_DIR:-/shared/register-output/codex/free}
      REGISTER_FREE_WORKSPACE_SELECTOR: ${REGISTER_FREE_WORKSPACE_SELECTOR:-personal}
      REGISTER_FREE_OAUTH_DELAY_SECONDS: ${REGISTER_FREE_OAUTH_DELAY_SECONDS:-0}
      REGISTER_TEAM_AUTH_LOCAL_DIR: ${REGISTER_TEAM_AUTH_LOCAL_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_DEFAULT_DIR: ${REGISTER_TEAM_AUTH_DEFAULT_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_DIR: ${REGISTER_TEAM_AUTH_DIR:-/shared/register-output/codex/team-input}
      REGISTER_TEAM_AUTH_GLOB: ${REGISTER_TEAM_AUTH_GLOB:-*-team.json}
      REGISTER_TEAM_AUTH_PATHS: ${REGISTER_TEAM_AUTH_PATHS:-}
      REGISTER_LOOP_DELAY_SECONDS: ${REGISTER_CONTINUE_LOOP_DELAY_SECONDS:-15}
      REGISTER_WORKER_COUNT: "2"
      REGISTER_WORKER_STAGGER_SECONDS: ${REGISTER_CONTINUE_WORKER_STAGGER_SECONDS:-5}
      REGISTER_CREATE_ACCOUNT_COOLDOWN_SECONDS: ${REGISTER_CREATE_ACCOUNT_COOLDOWN_SECONDS:-120}
      REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS:-15}
      REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD: ${REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD:-3}
      REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS:-120}
      REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT: ${REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT:-30}
      REGISTER_TEAM_CAPACITY_COOLDOWN_SECONDS: ${REGISTER_TEAM_CAPACITY_COOLDOWN_SECONDS:-180}
      REGISTER_CRASH_COOLDOWN_SECONDS: ${REGISTER_CRASH_COOLDOWN_SECONDS:-20}
      REGISTER_INFINITE_MAX_RUNS: ${REGISTER_CONTINUE_INFINITE_MAX_RUNS:-0}
      REGISTER_TASK_MAX_ATTEMPTS: ${REGISTER_CONTINUE_TASK_MAX_ATTEMPTS:-0}
      REGISTER_FLOW_PATH: /app/server/services/orchestration_service/flows/codex-openai-oauth-continue-v1.semantic-flow.json
      REGISTER_DASHBOARD_ENABLED: "false"
    volumes:
      - ${REGISTER_OUTPUT_DIR_HOST}:/shared/register-output
      - ${REGISTER_TEAM_AUTH_DIR_HOST:-C:/Users/vmjcv/.cli-proxy-api/team}:/shared/team-auth:ro
      - ../server:/app/server
      - ../README.md:/app/README.md:ro
    networks:
      - EasyAiMi

  register-team-service:
    image: registerservice/register-service:local
    container_name: register-team-service
    restart: unless-stopped
    environment:
      REGISTER_INSTANCE_ID: team
      REGISTER_INSTANCE_ROLE: team
      EASY_PROTOCOL_BASE_URL: http://easy-protocol-service:9788
      EASY_PROTOCOL_TIMEOUT_SECONDS: "900"
      MAILBOX_SERVICE_BASE_URL: http://easy-email-service:8080
      MAILBOX_SERVICE_API_KEY: ${MAILBOX_SERVICE_API_KEY}
      EASY_PROXY_BASE_URL: http://easy-proxy-service:9888
      EASY_PROXY_API_KEY: ${EASY_PROXY_API_KEY}
      REGISTER_ENABLE_EASY_PROXY: "true"
      REGISTER_REQUIRE_EASY_PROXY: "true"
      REGISTER_MAILBOX_ROUTING_PROFILE_ID: ${REGISTER_TEAM_MAILBOX_ROUTING_PROFILE_ID:-}
      REGISTER_MAILBOX_STRATEGY_MODE_ID: ${REGISTER_TEAM_MAILBOX_STRATEGY_MODE_ID:-}
      REGISTER_MAILBOX_PROVIDERS: ${REGISTER_TEAM_MAILBOX_PROVIDERS:-}
      REGISTER_OUTPUT_ROOT: /shared/register-output/others/team-runs
      REGISTER_OPENAI_OAUTH_POOL_DIR: ${REGISTER_OPENAI_OAUTH_POOL_DIR:-/shared/register-output/openai/pending}
      REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR: ${REGISTER_OPENAI_OAUTH_SUCCESS_POOL_DIR:-/shared/register-output/openai/converted}
      REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR: ${REGISTER_OPENAI_OAUTH_WAIT_POOL_DIR:-/shared/register-output/others/openai-oauth-wait-pool}
      REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR: ${REGISTER_OPENAI_OAUTH_CONTINUE_POOL_DIR:-/shared/register-output/openai/failed-once}
      REGISTER_OPENAI_OAUTH_WAIT_SECONDS: ${REGISTER_OPENAI_OAUTH_WAIT_SECONDS:-600}
      REGISTER_FREE_OAUTH_POOL_DIR: ${REGISTER_FREE_OAUTH_POOL_DIR:-/shared/register-output/codex/free}
      REGISTER_FREE_LOCAL_SPLIT_PERCENT: ${REGISTER_FREE_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_FREE_LOCAL_DIR: ${REGISTER_FREE_LOCAL_DIR:-/shared/register-output/codex/free}
      REGISTER_TEAM_LOCAL_SPLIT_PERCENT: ${REGISTER_TEAM_LOCAL_SPLIT_PERCENT:-100}
      REGISTER_TEAM_LOCAL_DIR: ${REGISTER_TEAM_LOCAL_DIR:-/shared/register-output/codex/team}
      REGISTER_LOOP_DELAY_SECONDS: ${REGISTER_TEAM_LOOP_DELAY_SECONDS:-20}
      REGISTER_WORKER_COUNT: "1"
      REGISTER_WORKER_STAGGER_SECONDS: ${REGISTER_TEAM_WORKER_STAGGER_SECONDS:-5}
      REGISTER_TEAM_STALE_CLAIM_SECONDS: ${REGISTER_TEAM_STALE_CLAIM_SECONDS:-60}
      REGISTER_TEAM_OAUTH_FAILURE_COOLDOWN_SECONDS: ${REGISTER_TEAM_OAUTH_FAILURE_COOLDOWN_SECONDS:-300}
      REGISTER_TEAM_INVITE_FAILURE_COOLDOWN_SECONDS: ${REGISTER_TEAM_INVITE_FAILURE_COOLDOWN_SECONDS:-300}
      REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_FAILURE_COOLDOWN_SECONDS:-15}
      REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD: ${REGISTER_MAILBOX_CLEANUP_FAILURE_THRESHOLD:-3}
      REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS: ${REGISTER_MAILBOX_CLEANUP_COOLDOWN_SECONDS:-120}
      REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT: ${REGISTER_MAILBOX_CLEANUP_MAX_DELETE_COUNT:-30}
      REGISTER_CRASH_COOLDOWN_SECONDS: ${REGISTER_CRASH_COOLDOWN_SECONDS:-20}
      REGISTER_INFINITE_MAX_RUNS: ${REGISTER_TEAM_INFINITE_MAX_RUNS:-0}
      REGISTER_TASK_MAX_ATTEMPTS: ${REGISTER_TEAM_TASK_MAX_ATTEMPTS:-0}
      REGISTER_FLOW_PATH: /app/server/services/orchestration_service/flows/codex-team-expand-v1.semantic-flow.json
      REGISTER_DASHBOARD_ENABLED: "false"
      REGISTER_TEAM_PRE_POOL_DIR: ${REGISTER_TEAM_PRE_POOL_DIR:-/shared/register-output/others/team-pre-pool}
      REGISTER_TEAM_MOTHER_POOL_DIR: ${REGISTER_TEAM_MOTHER_POOL_DIR:-/shared/register-output/codex/team-mother-input}
      REGISTER_TEAM_MOTHER_CLAIMS_DIR: ${REGISTER_TEAM_MOTHER_CLAIMS_DIR:-/shared/register-output/others/team-mother-claims}
      REGISTER_TEAM_MEMBER_CLAIMS_DIR: ${REGISTER_TEAM_MEMBER_CLAIMS_DIR:-/shared/register-output/others/team-member-claims}
      REGISTER_TEAM_POST_POOL_DIR: ${REGISTER_TEAM_POST_POOL_DIR:-/shared/register-output/others/team-post-pool}
      REGISTER_TEAM_POOL_DIR: ${REGISTER_TEAM_POOL_DIR:-/shared/register-output/codex/team}
      REGISTER_TEAM_PRE_FILL_COUNT: ${REGISTER_TEAM_PRE_FILL_COUNT:-1}
      REGISTER_TEAM_MEMBER_COUNT: ${REGISTER_TEAM_MEMBER_COUNT:-4}
      REGISTER_TEAM_WORKSPACE_SELECTOR: ${REGISTER_TEAM_WORKSPACE_SELECTOR:-first_team}
    volumes:
      - ${REGISTER_OUTPUT_DIR_HOST}:/shared/register-output
      - ${REGISTER_TEAM_AUTH_DIR_HOST:-C:/Users/vmjcv/.cli-proxy-api/team}:/shared/team-auth:ro
      - ../server:/app/server
      - ../README.md:/app/README.md:ro
    networks:
      - EasyAiMi

networks:
  EasyAiMi:
    external: true
